<!DOCTYPE html>
<html>
<head>
  <title>Campus Alert System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Smart Campus Alert</h1>
  <div id="app">
    <form id="alertForm">
      <input type="text" id="type" placeholder="Type (EMERGENCY/WEATHER/FACILITY)" required>
      <input type="text" id="message" placeholder="Message" required>
      <input type="text" id="location" placeholder="Location">
      <input type="text" id="createdBy" placeholder="Your user ID" required>
      <button type="submit">Send Alert</button>
    </form>
    <h2>Recent Alerts</h2>
    <ul id="alertList"></ul>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
