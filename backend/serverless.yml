service: smart-campus-alert

frameworkVersion: '3'

plugins:
  - serverless-dynamodb
  - serverless-offline-aws-eventbridge
  - serverless-offline-sns
  - serverless-offline


provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: dev
  environment:
    ALERTS_TABLE: ${self:service}-alerts-${sls:stage}
    USERS_TABLE: ${self:service}-users-${sls:stage}
    EVENT_BUS_NAME: CampusEventBus-${sls:stage}
    EMERGENCY_TOPIC_ARN: !Ref EmergencyTopic
    FACILITY_TOPIC_ARN: !Ref FacilityTopic
    # API Key for simple auth (shared secret)
    API_KEY: ${opt:apiKey, 'default-change-me-in-production'}
    # Weather API endpoint
    WEATHER_API_URL: "https://wttr.in"

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource: !GetAtt CampusEventBus.Arn
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:Query
          Resource:
            - !GetAtt AlertsTable.Arn
            - !GetAtt UsersTable.Arn
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - !Ref EmergencyTopic
            - !Ref FacilityTopic
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: !GetAtt EventDLQ.Arn
        - Effect: Allow
          Action:
            - cloudwatch:PutMetricData
          Resource: '*'



functions:
  createAlert:
    handler: functions/createAlert.handler
    events:
      - http:
          path: alerts
          method: post
          cors: true
    environment:
      EVENT_BUS_NAME: ${self:provider.environment.EVENT_BUS_NAME}
      API_KEY: ${self:provider.environment.API_KEY}


  processAlert:
    handler: functions/processAlert.handler
    events:
      - eventBridge:
          eventBus: !Ref CampusEventBus
          pattern:
            source:
              - campus.alert
            detail-type:
              - AlertCreated
    destinations:
      onFailure: !GetAtt EventDLQ.Arn


  notifyUsers:
    handler: functions/notifyUsers.handler
    events:
      - eventBridge:
          eventBus: !Ref CampusEventBus
          pattern:
            source:
              - campus.alert
            detail-type:
              - AlertCreated
    destinations:
      onFailure: !GetAtt EventDLQ.Arn


  persistAlert:
    handler: functions/persistAlert.handler
    events:
      - eventBridge:
          eventBus: !Ref CampusEventBus
          pattern:
            source:
              - campus.alert
            detail-type:
              - AlertCreated
    destinations:
      onFailure: !GetAtt EventDLQ.Arn

    environment:
      ALERTS_TABLE: ${self:provider.environment.ALERTS_TABLE}

  getAlerts:
    handler: functions/getAlerts.handler
    events:
      - http:
          path: alerts
          method: get
          cors: true
    environment:
      ALERTS_TABLE: ${self:provider.environment.ALERTS_TABLE}

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
    lambdaPort: 3002
  
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
      seed: true
  
  serverless-offline-aws-eventbridge:
    port: 4010
    debug: true
    account: "123456789012"
  
  serverless-offline-sns:
    port: 4002
    debug: true


resources:
  Resources:
    CampusEventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:provider.environment.EVENT_BUS_NAME}

    AlertsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ALERTS_TABLE}
        AttributeDefinitions:
          - AttributeName: alertId
            AttributeType: S
        KeySchema:
          - AttributeName: alertId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    EmergencyTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: campus-emergency-${sls:stage}

    FacilityTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: campus-facility-${sls:stage}

    EventDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: campus-event-dlq-${sls:stage}
        MessageRetentionPeriod: 1209600  # 14 days